version: '3.9'

services:
  rf4-backend:
    # 仅生产部署使用（CI 只 scp 本文件到生产机，不传 backend/ 源码）。
    # 本地构建镜像请直接：docker build -t polarsnowleopard/rf4-backend:latest backend
    image: polarsnowleopard/rf4-backend:latest
    restart: always
    ports:
      - "9999:9999"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=rf4.settings
    volumes:
      - static_volume:/project/app/staticfiles
    command: python -m gunicorn rf4.asgi:application -k uvicorn.workers.UvicornWorker -b 0.0.0.0:9999

volumes:
  static_volume:
